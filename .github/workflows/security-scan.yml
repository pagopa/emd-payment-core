# Builds the Docker image and runs a Trivy vulnerability scan.
# Results are uploaded to GitHub Advanced Security (SARIF).
# workflow_call: invoked by pr-pipeline.yml AFTER depcheck (dep-sha256.json aligned).
# schedule/workflow_dispatch keep the standalone (main) behavior unchanged.
# NOTE: the direct `pull_request` trigger was removed — PR scans now run through the
# orchestrator to enforce the depcheck → security-scan ordering.
name: Container Scan

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: '00 07 * * *'

# Cancel in-progress scans for the same PR when a new commit arrives.
# For schedule/dispatch, each run gets its own group via github.run_id.
concurrency:
  group: security-scan-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  BuildAndScan:
    permissions:
      contents: read        # checkout
      security-events: write # upload-sarif
      actions: read         # upload-sarif on private repos
    runs-on: ubuntu-latest


    outputs:
      CVE_CRITICAL: ${{ env.CVE_CRITICAL }}
      CVE_HIGH: ${{ env.CVE_HIGH }}
      CVE_MEDIUM: ${{ env.CVE_MEDIUM }}

    steps:
      - name: Checkout the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag localbuild/testimage:latest --build-arg GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scan
        id: scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          # Config lives under .github/workflows/config/, not at repo root.
          trivy-config: '.github/workflows/config/trivy.yaml'
          image-ref: "localbuild/testimage:latest"
          format: 'sarif'
          output: 'results.sarif'

      - name: Upload Trivy SARIF report
        uses: github/codeql-action/upload-sarif@99c9897648dded3fe63d6f328c46089dd57735ca # codeql bundle v2.17.0
        with:
          sarif_file: 'results.sarif'

      - name: Extract CVE counts
        run: |
          SCAN_RESULTS=$(jq -r 'try .runs[0].tool.driver.rules | try map(.shortDescription.text) | join("\\n")' results.sarif)
          echo "CVE_CRITICAL=$(echo $SCAN_RESULTS | grep -o CRITICAL | wc -l)" >> $GITHUB_ENV
          echo "CVE_HIGH=$(echo $SCAN_RESULTS | grep -o HIGH | wc -l)" >> $GITHUB_ENV
          echo "CVE_MEDIUM=$(echo $SCAN_RESULTS | grep -o MEDIUM | wc -l)" >> $GITHUB_ENV
          echo "$SCAN_RESULTS"

      - name: Fail if CVE HIGH or CRITICAL are detected
        if: env.CVE_HIGH > 0 || env.CVE_CRITICAL > 0
        run: exit 1

  SendSlackNotification:
    needs: BuildAndScan
    uses: ./.github/workflows/send-notification.yml
    if: always() && (needs.BuildAndScan.outputs.CVE_HIGH > 0 || needs.BuildAndScan.outputs.CVE_CRITICAL > 0)
    with:
      CVE_CRITICAL: ${{ needs.BuildAndScan.outputs.CVE_CRITICAL }}
      CVE_HIGH: ${{ needs.BuildAndScan.outputs.CVE_HIGH }}
      CVE_MEDIUM: ${{ needs.BuildAndScan.outputs.CVE_MEDIUM }}
    secrets: inherit
