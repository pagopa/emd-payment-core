name: CI - Tests

# Reusable workflow — invoked by pr-pipeline.yml after depcheck.
# Always runs on every PR (orchestrator gates it with !failure() && !cancelled()).

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: 🧪 Build & Test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4.1.7
        with:
          # Latest branch tip — includes any dep-sha256.json commit from depcheck.
          ref: ${{ github.head_ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4.2.1
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Maven Settings
        run: |
          mkdir -p ~/.m2
          echo '<settings><servers><server><id>github</id><username></username><password>${{ secrets.GITHUB_TOKEN }}</password></server></servers></settings>' > ~/.m2/settings.xml

      - name: Run tests
        run: mvn verify -B
