name: Auto-update depcheck for Dependabot

on:
  push:
    branches:
      - 'dependabot/**'

jobs:
  update-depcheck:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: ${{ github.actor }}
          server-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run mvn depcheck:generate
        run: mvn depcheck:generate

      - name: Commit and push changes (Native Git)
        run: |
          # 1. Configura l'utente Git (obbligatorio per fare un commit)
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. Aggiungi solo il file specifico
          git add **/dep-sha256.json
          
          # 3. Fai il commit solo se ci sono reali modifiche (evita che la action fallisca se il file era già aggiornato)
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update dep-sha256.json"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "Nessuna modifica rilevata per dep-sha256.json"
          fi