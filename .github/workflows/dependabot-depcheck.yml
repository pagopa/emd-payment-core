name: Auto-update depcheck for Dependabot

on:
  push:
    branches:
      - 'dependabot/**'

jobs:
  update-depcheck:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.MIL_BOT_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Setup Maven Settings
        run: |
          mkdir -p ~/.m2
          echo '<settings><servers><server><id>github</id><username></username><password>${{ secrets.GITHUB_TOKEN }}</password></server></servers></settings>' > ~/.m2/settings.xml

      - name: Run mvn depcheck:generate
        run: mvn depcheck:generate -U

      - name: Commit and push changes (Native Git)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add dep-sha256.json
          
          if ! git diff --cached --quiet; then
            echo "Modifiche rilevate per dep-sha256.json. Procedo al commit."
            git commit -m "chore: auto-update dep-sha256.json"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "Nessuna modifica rilevata per dep-sha256.json"
          fi