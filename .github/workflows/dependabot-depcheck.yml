name: Auto-update depcheck for Dependabot

# Runs on every push to dependabot/** branches.
# Regenerates dep-sha256.json to match the updated pom.xml and commits it back.
# The bot push uses a PAT (MIL_BOT_TOKEN) so GitHub fires a PR `synchronize`
# event, re-triggering code-review and security-scan with the correct file.

on:
  push:
    branches:
      - 'dependabot/**'

# Queue runs instead of cancelling — the second run (from the bot's own commit)
# is skipped immediately by the `if` guard below.
concurrency:
  group: depcheck-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-depcheck:
    name: 🔄 Update dep-sha256.json
    runs-on: ubuntu-22.04

    # Prevents an infinite loop: skip if this workflow triggered itself.
    if: "!contains(github.event.head_commit.message, 'chore: auto-update dep-sha256.json')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.6.0
        with:
          ref: ${{ github.ref_name }}
          # PAT required — GITHUB_TOKEN pushes don't trigger downstream workflow events.
          token: ${{ secrets.EMD_BOT_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Maven Settings
        run: |
          mkdir -p ~/.m2
          echo '<settings><servers><server><id>github</id><username></username><password>${{ secrets.GITHUB_TOKEN }}</password></server></servers></settings>' > ~/.m2/settings.xml

      - name: Run mvn depcheck:generate
        run: mvn depcheck:generate -U -B

      - name: Commit and push dep-sha256.json
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add dep-sha256.json

          if ! git diff --cached --quiet; then
            echo "✅ Changes detected — committing dep-sha256.json."
            git commit -m "chore: auto-update dep-sha256.json"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "ℹ️  No changes in dep-sha256.json — skipping commit."
          fi