version: 2

registries:
  github-pagopa:
    type: maven-repository
    url: https://maven.pkg.github.com/pagopa
    username: "emd-gh-bot"
    password: ${{secrets.EMD_BOT_TOKEN}}

updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

    groups:
      non-major-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"